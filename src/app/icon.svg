<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0a0b0e"/>
  <!-- Track ring -->
  <circle
    cx="16" cy="16" r="11"
    stroke="rgba(255,244,220,0.12)"
    stroke-width="2.5"
    stroke-linecap="round"
  />
  <!-- Progress arc (~72% filled), rotated so it starts at top -->
  <circle
    cx="16" cy="16" r="11"
    stroke="#f1b36a"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-dasharray="69.115"
    stroke-dashoffset="19.352"
    transform="rotate(-90 16 16)"
    style="filter:drop-shadow(0 0 3px rgba(241,179,106,0.7))"
  />
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#f1b36a"/>
</svg>
